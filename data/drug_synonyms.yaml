# Antibiotic name normalization for BV-BRC AST labels.
#
# Matching is done after normalizing the raw bucket (lowercase, strip,
# collapse whitespace, remove mojibake like trailing 'Â').
#
# synonyms: raw bucket (after that normalization) -> canonical name.
#   Only unambiguous mappings are listed (clear misspellings / known aliases).
# known_canonical: canonical names accepted as-is (raw bucket == canonical).
# Anything not matching either list is UNTRUSTED: excluded from the clean
# labels and listed in the audit report (class-level buckets, garbage, and
# ambiguous variants we refuse to guess about).

synonyms:
  # clear misspellings seen in the dumps
  tigecyklin: tigecycline
  tetracyklin: tetracycline
  trimotheprim: trimethoprim
  # spelling / alias variants of the same drug
  amoxicillin_clavulanat: amoxicillin/clavulanic acid
  cefpodoxime_clavulanic_acid: cefpodoxime/clavulanic acid
  sulfamethoxazole/trimethoprim: trimethoprim/sulfamethoxazole
  cefalexin: cephalexin          # INN vs USAN-style spelling
  cefalotin: cephalothin         # INN vs USAN-style spelling
  cefpirom: cefpirome

known_canonical:
